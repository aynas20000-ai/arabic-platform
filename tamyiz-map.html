<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>خريطة مفاهيم درس التمييز</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: #f5f7fb;
      text-align: center;
    }

    header {
      background: #1769c2;
      color: white;
      padding: 35px 15px;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    main {
      max-width: 900px;
      margin: 25px auto;
      padding: 15px;
    }

    .map-box {
      background: white;
      padding: 18px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .back {
      display: block;
      width: fit-content;
      margin: 30px auto;
      padding: 13px 25px;
      background: #1769c2;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<header>
  <h1>🧠 خريطة مفاهيم درس التمييز</h1>
</header>

<main>

  <div class="map-box">
  <img src="خريطة مفاهيم.png" alt="خريطة مفاهيم درس التمييز" style="width:100%; border-radius:16px;">
  </div>

  <a class="back" href="tamyiz.html">
    العودة إلى درس التمييز
  </a>

</main>

</body>
</html>
