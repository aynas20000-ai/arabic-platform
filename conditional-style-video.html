<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شرح درس أسلوب الشرط بالفيديو</title>

  <style>
    body{
      margin:0;
      font-family:Tahoma,Arial,sans-serif;
      background:#f5f5f5;
      text-align:center;
    }

    header{
      background:#1565c0;
      color:white;
      padding:35px 20px;
    }

    section{
      background:white;
      margin:30px auto;
      padding:25px;
      width:85%;
      max-width:700px;
      border-radius:18px;
      box-shadow:0 4px 15px rgba(0,0,0,0.12);
    }

    .video{
      position:relative;
      width:100%;
      padding-bottom:56.25%;
      height:0;
      overflow:hidden;
      border-radius:14px;
    }

    .video iframe{
      position:absolute;
      top:0;
      right:0;
      width:100%;
      height:100%;
      border:0;
    }

    .back{
      display:inline-block;
      margin-top:25px;
      color:#1565c0;
      font-weight:bold;
      text-decoration:none;
    }

    footer{
      background:#222;
      color:white;
      padding:20px;
      margin-top:30px;
    }
  </style>
</head>

<body>

<header>
  <h1>🎥 شرح درس أسلوب الشرط</h1>
</header>

<section>

  <div class="video">
    <iframe
      src="https://www.youtube.com/embed/j33RmNWIeWg"
      title="شرح درس أسلوب الشرط"
      allowfullscreen>
    </iframe>
  </div>

  <a class="back" href="conditional-style.html">
    العودة إلى درس أسلوب الشرط
  </a>

</section>

<footer>
  جميع الحقوق محفوظة © 2026
</footer>

</body>
</html>
