<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>اختبار درس التمييز</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #fff7ed, #ffedd5);
      color: #3f2d20;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #ea580c, #f97316);
      color: white;
      text-align: center;
      padding: 35px 15px;
      border-radius: 0 0 30px 30px;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin: 10px 0 0;
      font-size: 18px;
    }

    main {
      max-width: 750px;
      margin: 25px auto;
      padding: 15px;
    }

    .progress-box {
      background: white;
      padding: 15px;
      border-radius: 18px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .progress {
      height: 14px;
      background: #fed7aa;
      border-radius: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #f97316, #fb923c);
      transition: width 0.4s;
    }

    .quiz-card {
      background: white;
      padding: 24px;
      border-radius: 22px;
      box-shadow: 0 5px 18px rgba(0, 0, 0, 0.1);
    }

    .question-number {
      color: #ea580c;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .question {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .answers {
      display: grid;
      gap: 12px;
    }

    .answer {
      width: 100%;
      border: 2px solid #fdba74;
      background: #fff7ed;
      padding: 15px;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      text-align: right;
      transition: 0.2s;
    }

    .answer:hover {
      background: #ffedd5;
    }

    .answer.correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #166534;
    }

    .answer.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      color: #991b1b;
    }

    .message {
      min-height: 55px;
      margin-top: 18px;
      padding: 12px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .next-btn,
    .restart-btn,
    .back-btn {
      display: block;
      width: 100%;
      border: none;
      padding: 15px;
      border-radius: 15px;
      font-size: 19px;
      cursor: pointer;
      margin-top: 15px;
      text-decoration: none;
      text-align: center;
    }

    .next-btn {
      background: #ea580c;
      color: white;
      display: none;
    }

    .restart-btn {
      background: #7c3aed;
      color: white;
    }

    .back-btn {
      background: #475569;
      color: white;
    }

    .result {
      display: none;
      text-align: center;
      background: white;
      padding: 30px 20px;
      border-radius: 22px;
      box-shadow: 0 5px 18px rgba(0, 0, 0, 0.1);
    }

    .result-icon {
      font-size: 70px;
    }

    .result h2 {
      color: #ea580c;
      font-size: 30px;
    }

    .score {
      font-size: 24px;
      font-weight: bold;
      margin: 20px 0;
    }

    .shake {
      animation: shake 0.35s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(8px); }
      50% { transform: translateX(-8px); }
      75% { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>

</header>
